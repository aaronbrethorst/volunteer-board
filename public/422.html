<!doctype html>
<html lang="en">
  <head>
    <title>Change rejected - VolunteerBoard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #f9fafb;
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 32rem;
      }
      .error-code {
        font-size: 6rem;
        font-weight: 800;
        color: #f59e0b;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1rem;
        color: #6b7280;
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        background-color: #6366f1;
        color: #fff;
        font-weight: 600;
        font-size: 0.875rem;
        padding: 0.625rem 1.25rem;
        border-radius: 0.375rem;
        text-decoration: none;
        transition: background-color 0.15s;
      }
      a:hover { background-color: #4f46e5; }
      @media (prefers-color-scheme: dark) {
        body { background-color: #111827; color: #e5e7eb; }
        .error-code { color: #fbbf24; }
        h1 { color: #f9fafb; }
        p { color: #9ca3af; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">422</div>
      <h1>Change rejected</h1>
      <p>The change you wanted was rejected. You may not have access to perform this action.</p>
      <a href="/">Go back home</a>
    </div>
  </body>
</html>
