<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pixel-art "OV" favicon matching OSSVolunteers branding -->
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e293b"/>
  <!-- "O" in light slate (left side) - pixel style -->
  <rect x="3" y="10" width="3" height="12" fill="#e2e8f0"/>
  <rect x="6" y="7" width="6" height="3" fill="#e2e8f0"/>
  <rect x="6" y="22" width="6" height="3" fill="#e2e8f0"/>
  <rect x="12" y="10" width="3" height="12" fill="#e2e8f0"/>
  <!-- "V" in amber (right side) - pixel style -->
  <rect x="17" y="7" width="3" height="12" fill="#d97706"/>
  <rect x="27" y="7" width="3" height="12" fill="#d97706"/>
  <rect x="20" y="16" width="3" height="6" fill="#d97706"/>
  <rect x="24" y="16" width="3" height="6" fill="#d97706"/>
  <rect x="22" y="22" width="3" height="3" fill="#d97706"/>
</svg>
